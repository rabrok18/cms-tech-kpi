<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS — Tech KPI Leaderboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');
:root{
  --navy:#1c2d41;--navy2:#243347;--navy3:#2d3f56;
  --bg:#f2f4f7;--white:#fff;--border:#e2e8f0;--text:#0f1623;--sub:#64748b;
  --green:#15803d;--glt:#f0fdf4;--gbd:#a7f3d0;
  --red:#b91c1c;--rlt:#fef2f2;--rbd:#fca5a5;
  --amber:#ef4136;--alt:#fff7ed;--abd:#fdba74;
  --gold:#fbb040;--golddk:#92400e;
  --blue:#1d4ed8;--blt:#eff6ff;--bbd:#93c5fd;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HDR */
.hdr{background:var(--navy);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--navy3)}
.hdr-right{font-size:11px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:6px}
.live-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* WRAP */
.wrap{max-width:520px;margin:0 auto;padding:16px 14px 64px;display:flex;flex-direction:column;gap:14px}

/* HERO BANNER */
.hero-banner{background:var(--navy);border-radius:var(--r);padding:20px 18px 18px}
.hb-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.hb-title{font-size:20px;font-weight:900;color:#fff;line-height:1.1}
.hb-sub{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
.hb-stat{text-align:right}
.hb-stat-num{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;color:var(--gold);line-height:1}
.hb-stat-lbl{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.hb-progress{display:flex;gap:8px;align-items:center}
.hb-progress-label{font-size:11px;color:rgba(255,255,255,.5)}
.hb-prog-track{flex:1;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.hb-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--amber),var(--gold))}

/* SEC LABEL */
.sec{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--sub);margin-bottom:-6px}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-navy-hdr{background:var(--navy);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.card-navy-title{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.6)}
.card-body{padding:16px}
.chart-wrap{position:relative;height:200px}
.chart-wrap.tall{height:240px}

/* QUARTER STATUS */
.q-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.qstat-card{border-radius:10px;padding:12px 14px;border:1px solid var(--border);background:var(--bg)}
.qstat-card.bonus{background:var(--glt);border-color:var(--gbd)}
.qstat-card.dead{background:var(--rlt);border-color:var(--rbd)}
.qstat-card.alive{background:var(--blt);border-color:var(--bbd)}
.qstat-card.pend{background:var(--bg);border-color:var(--border)}
.qs-name{font-size:13px;font-weight:700;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qs-dots{display:flex;gap:3px;margin-bottom:6px}
.qs-dot{flex:1;height:22px;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;gap:0}
.qs-dot-mo{font-size:7px;opacity:.6}
.qs-dot.pass{background:#dcfce7;color:var(--green)}
.qs-dot.fail{background:#fee2e2;color:var(--red)}
.qs-dot.none{background:#e2e8f0;color:#94a3b8}
.qs-verdict{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.qs-verdict.vg{color:var(--green)}.qs-verdict.vr{color:var(--red)}.qs-verdict.vb{color:var(--blue)}.qs-verdict.vy{color:var(--sub)}

/* LEADERBOARD TABLE */
.lb-list{display:flex;flex-direction:column}
.lb-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;text-decoration:none;color:inherit}
.lb-item:last-child{border-bottom:none}
.lb-item:hover{background:var(--alt)}
.lb-item:active{background:#fde8cc}
.lb-rank-wrap{width:30px;text-align:center;flex-shrink:0}
.lb-rank-icon{font-size:20px;line-height:1}
.lb-rank-num{font-family:'DM Mono',monospace;font-size:14px;color:var(--sub);font-weight:500}
.lb-avatar{width:36px;height:36px;border-radius:50%;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--gold);flex-shrink:0;letter-spacing:-.5px}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-class{font-size:11px;color:var(--sub);margin-top:1px}
.lb-right{text-align:right;flex-shrink:0}
.lb-score{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1}
.lb-score.s1{color:#b45309}.lb-score.s2{color:#64748b}.lb-score.s3{color:#78350f}
.lb-score-max{font-size:10px;color:var(--sub)}
.lb-mini-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;width:60px;margin:4px 0 2px auto}
.lb-mini-fill{height:100%;border-radius:2px}
.lb-q-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:3px}
.lb-bonus-chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--alt);color:var(--golddk);border:1px solid var(--abd);display:inline-block}
.lb-arrow{color:var(--sub);font-size:16px;flex-shrink:0}

/* NO DATA */
.no-data{text-align:center;padding:80px 20px;color:var(--sub)}
.no-data .icon{font-size:36px;margin-bottom:12px}

.qvc-partial{background:#fffbeb;color:#92400e;border:1px solid #fde68a}
.qstat-card.partial{background:#fffbeb;border-color:#fde68a}
.qs-verdict.vp{color:#92400e}

/* TECH DETAIL VIEW */
.td-back{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:600;color:var(--sub);text-decoration:none;margin-bottom:10px;transition:color .15s}
.td-back:hover{color:var(--text)}
.td-hero{background:var(--navy);border-radius:var(--r);padding:22px 20px 18px;margin-bottom:14px}
.td-hero-top{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.td-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--amber),var(--gold));display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.td-hero-info{flex:1}
.td-name{font-size:22px;font-weight:900;color:#fff;line-height:1.1}
.td-class{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
.td-stat-row{display:flex;gap:10px;margin-top:10px}
.td-stat{flex:1;text-align:center;background:rgba(255,255,255,.06);border-radius:8px;padding:8px 6px}
.td-stat-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--gold);line-height:1}
.td-stat-lbl{font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.td-kpi-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.td-kpi{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.td-kpi-icon{font-size:22px;margin-bottom:4px}
.td-kpi-name{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.td-kpi-val{font-family:'DM Mono',monospace;font-size:18px;font-weight:600;line-height:1}
.td-kpi-goal{font-size:10px;color:var(--sub);margin-top:3px}
.td-kpi.pass{border-color:var(--gbd);background:var(--glt)}
.td-kpi.pass .td-kpi-val{color:var(--green)}
.td-kpi.fail{border-color:var(--rbd);background:var(--rlt)}
.td-kpi.fail .td-kpi-val{color:var(--red)}
.td-kpi.na{opacity:.5}
.td-month-tbl{width:100%;border-collapse:collapse;font-size:12px}
.td-month-tbl th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.td-month-tbl td{padding:8px 10px;border-bottom:1px solid var(--border)}
.td-month-tbl tr:last-child td{border-bottom:none}
.td-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
.td-pill.pass{background:var(--glt);color:var(--green)}
.td-pill.fail{background:var(--rlt);color:var(--red)}
.td-pill.na{background:var(--bg);color:var(--sub)}
@media(max-width:400px){.td-kpi-grid{grid-template-columns:1fr}.td-stat-row{flex-wrap:wrap}}
</style>
</head>

<script>
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QS={Q1:['Jan','Feb','Mar'],Q2:['Apr','May','Jun'],Q3:['Jul','Aug','Sep'],Q4:['Oct','Nov','Dec']};
const MAX=36;
const ELIGIBLE=['3rd Year Apprentice','4th Year Apprentice','5th Year Apprentice','Journeyman'];
const RANK_ICONS=['🥇','🥈','🥉'];
const RANK_BAR=['#d97706','#94a3b8','#92400e'];
const TECH_COLORS=['#ef4136','#fbb040','#1d4ed8','#15803d','#7c3aed','#0891b2','#be185d','#b45309'];

const toSlug=n=>n.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
const sortedMonths=m=>Object.keys(m).sort((a,b)=>{const[am,ay]=a.split(' '),[bm,by]=b.split(' ');return(parseInt(ay)-parseInt(by))||(MON.indexOf(am)-MON.indexOf(bm))});
function allNames(months){const s=new Set();for(const md of Object.values(months))Object.keys(md.techs).forEach(n=>s.add(n));return[...s].sort()}
function yearScore(name,months){let t=0;for(const md of Object.values(months)){const tk=md.techs[name];if(tk)t+=tk.passCount;}return t}


// Quarterly payout tiers
const Q_PAYOUT = {0: 0, 1: 0, 2: 200, 3: 300};

function qPayout(passedMonths) {
  return Q_PAYOUT[Math.min(passedMonths, 3)] || 0;
}

function qLabel(passedMonths, loaded) {
  const payout = qPayout(passedMonths);
  if (loaded < 3) {
    // Quarter still in progress
    if (passedMonths === 0 && loaded > 0) return { cls:'dead', txt:`$0 — No bonus possible`, chip:'qvc-dead', chipTxt:'$0', short:'vr' };
    if (passedMonths === loaded) return { cls:'alive', txt:`${passedMonths}/${loaded} passed — still on track`, chip:'qvc-alive', chipTxt:'On Track', short:'vb' };
    return { cls:'alive', txt:`${passedMonths}/${loaded} passed — quarter in progress`, chip:'qvc-alive', chipTxt:'In Progress', short:'vb' };
  }
  // Quarter complete (all 3 months loaded)
  if (payout === 0)   return { cls:'dead',  txt:`0 months passed — no bonus`, chip:'qvc-dead',  chipTxt:'$0',   short:'vr' };
  if (passedMonths === 2) return { cls:'partial', txt:`2/3 months — partial bonus earned`, chip:'qvc-partial', chipTxt:'$200', short:'vp' };
  if (passedMonths === 3) return { cls:'bonus',  txt:`All 3 months passed — full bonus!`, chip:'qvc-bonus',  chipTxt:'$300', short:'vg' };
  return { cls:'dead', txt:`No bonus`, chip:'qvc-dead', chipTxt:'$0', short:'vr' };
}


function filterEligible(data){
  const hasRoster=data.roster&&Object.keys(data.roster).length>0;
  const out=JSON.parse(JSON.stringify(data));
  for(const mk of Object.keys(out.months)){
    const techs=out.months[mk].techs;
    for(const n of Object.keys(techs)){
      // Remove if toggled off
      if(data.active&&data.active[n]===false){delete techs[n];continue;}
      // Remove if roster set but tech not eligible class
      if(hasRoster){
        const cls=data.roster[n];
        if(!cls||!ELIGIBLE.includes(cls)){delete techs[n];continue;}
      }
    }
  }
  return out;
}

function qStatus(name,months){
  const s=sortedMonths(months);if(!s.length)return null;
  const[lm,ly]=s[s.length-1].split(' ');
  const curQ=Object.entries(QS).find(([,ms])=>ms.includes(lm))[0];
  const qMons=QS[curQ].map(m=>`${m} ${ly}`);
  const results=qMons.map(mk=>months[mk]?.techs[name]?.monthPass??null);
  const loaded=results.filter(v=>v!==null);
  return{curQ,ly,qMons,results,loaded,anyFail:results.some(v=>v===false),allPass:loaded.length===3&&loaded.every(Boolean)};
}

function initials(name){return name.split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase()}

let charts={};
function destroyCharts(){for(const c of Object.values(charts)){try{c.destroy()}catch{}}charts={};}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  let data;
  try{const r=await fetch('data.json?v='+Date.now());if(!r.ok)throw 0;data=await r.json();}
  catch{showErr('Could not load KPI data.');return;}
  if(!data||!Object.keys(data.months||{}).length){showErr('No data published yet.');return;}
  if(data.updatedAt)document.getElementById('hdrDate').textContent=new Date(data.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  data=filterEligible(data);
  // Check for ?tech= parameter — show detail view for that tech
  const params=new URLSearchParams(location.search);
  const techSlug=params.get('tech');
  if(techSlug){
    const names=allNames(data.months);
    const match=names.find(n=>toSlug(n)===techSlug);
    if(match){renderTechDetail(match,data);return;}
  }
  renderLeaderboard(data);
}

function showErr(msg){document.getElementById('wrap').innerHTML=`<div class="no-data"><div class="icon">📊</div><p>${msg}</p></div>`;}

// ── TECH DETAIL VIEW ─────────────────────────────────────────
function renderTechDetail(name,data){
  const months=sortedMonths(data.months);
  const score=yearScore(name,data.months);
  const cls=data.roster?.[name]||'';
  const qs=qStatus(name,data.months);
  const names=allNames(data.months);
  const lb=names.map(n=>({name:n,score:yearScore(n,data.months)})).sort((a,b)=>b.score-a.score);
  const rank=lb.findIndex(t=>t.name===name)+1;

  // Latest month KPIs
  const latestMon=months[months.length-1];
  const latestData=data.months[latestMon]?.techs[name]||{};

  // Quarterly goals info
  const qGoals=qs?qs.qMons.reduce((sum,mk)=>(sum+(data.months[mk]?.techs[name]?.passCount||0)),0):0;
  const qLoaded=qs?qs.loaded.length:0;
  const qMaxGoals=qLoaded*3;

  const wrap=document.getElementById('wrap');
  wrap.innerHTML=`
    <a class="td-back" href="tech.html">&#8592; Back to Leaderboard</a>
    <div class="td-hero">
      <div class="td-hero-top">
        <div class="td-avatar">${initials(name)}</div>
        <div class="td-hero-info">
          <div class="td-name">${name}</div>
          <div class="td-class">${cls||'Unclassified'} · Rank #${rank} of ${lb.length}</div>
        </div>
      </div>
      <div class="td-stat-row">
        <div class="td-stat"><div class="td-stat-val">${score}</div><div class="td-stat-lbl">YTD Score</div></div>
        <div class="td-stat"><div class="td-stat-val">${MAX}</div><div class="td-stat-lbl">Max Possible</div></div>
        <div class="td-stat"><div class="td-stat-val">#${rank}</div><div class="td-stat-lbl">Rank</div></div>
        <div class="td-stat"><div class="td-stat-val">${qs?qs.curQ:'—'}</div><div class="td-stat-lbl">Quarter</div></div>
      </div>
    </div>

    <div class="sec">Latest Month — ${latestMon}</div>
    <div class="td-kpi-grid">
      <div class="td-kpi ${latestData.devPass===true?'pass':latestData.devPass===false?'fail':'na'}">
        <div class="td-kpi-icon">🔧</div>
        <div class="td-kpi-name">Hrs Deviation</div>
        <div class="td-kpi-val">${latestData.hrsDev!=null?latestData.hrsDev.toFixed(1)+' hrs':'N/A'}</div>
        <div class="td-kpi-goal">Goal: ≥ 0 hrs</div>
      </div>
      <div class="td-kpi ${latestData.recPass===true?'pass':latestData.recPass===false?'fail':'na'}">
        <div class="td-kpi-icon">⭐</div>
        <div class="td-kpi-name">Recommendations</div>
        <div class="td-kpi-val">${latestData.rec!=null?latestData.rec:'N/A'}</div>
        <div class="td-kpi-goal">Goal: ≥ 20</div>
      </div>
      <div class="td-kpi ${latestData.drvPass===true?'pass':latestData.drvPass===false?'fail':'na'}">
        <div class="td-kpi-icon">🚗</div>
        <div class="td-kpi-name">Driver Score</div>
        <div class="td-kpi-val">${latestData.drv!=null?latestData.drv+'%':'N/A'}</div>
        <div class="td-kpi-goal">Goal: ≥ 75%</div>
      </div>
    </div>

    <div class="sec">Month-by-Month Breakdown</div>
    <div class="card">
      <div class="card-navy-hdr"><div class="card-navy-title">${name} — All Months</div></div>
      <div class="card-body" style="padding:0;overflow-x:auto">
        <table class="td-month-tbl">
          <thead><tr><th>Month</th><th>Deviation</th><th>Recs</th><th>Driver</th><th>Goals</th><th>Pass</th></tr></thead>
          <tbody>${months.map(mk=>{
            const t=data.months[mk]?.techs[name];
            if(!t)return`<tr><td>${mk}</td><td colspan="5" style="color:var(--sub)">No data</td></tr>`;
            return`<tr>
              <td style="font-weight:700">${mk}</td>
              <td><span class="td-pill ${t.devPass===true?'pass':t.devPass===false?'fail':'na'}">${t.hrsDev!=null?t.hrsDev.toFixed(1)+' hrs':'—'}</span></td>
              <td><span class="td-pill ${t.recPass===true?'pass':t.recPass===false?'fail':'na'}">${t.rec!=null?t.rec:'—'}</span></td>
              <td><span class="td-pill ${t.drvPass===true?'pass':t.drvPass===false?'fail':'na'}">${t.drv!=null?t.drv+'%':'—'}</span></td>
              <td style="font-family:'DM Mono',monospace;font-weight:600">${t.passCount}/3</td>
              <td><span class="td-pill ${t.monthPass===true?'pass':t.monthPass===false?'fail':'na'}">${t.monthPass===true?'Yes':t.monthPass===false?'No':'—'}</span></td>
            </tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>

    ${qs?`<div class="sec">${qs.curQ} ${qs.ly} — Quarterly Bonus</div>
    <div class="card">
      <div class="card-navy-hdr"><div class="card-navy-title">${qs.curQ} Bonus Tracker</div></div>
      <div class="card-body">
        <div style="display:flex;gap:10px;justify-content:center;margin-bottom:12px">${qs.qMons.map((mk,i)=>{
          const v=qs.results[i];
          return`<div style="text-align:center;flex:1">
            <div style="font-size:28px;line-height:1">${v===true?'✅':v===false?'❌':'⏳'}</div>
            <div style="font-size:11px;color:var(--sub);margin-top:4px">${mk}</div>
          </div>`;
        }).join('')}</div>
        <div style="text-align:center;font-size:13px;color:var(--sub)">
          Goals hit: <strong style="color:var(--text)">${qGoals}</strong> / ${qMaxGoals}
          ${qLoaded===3?`<br>Payout: <strong style="color:${qPayout(qs.loaded.filter(Boolean).length)>0?'var(--green)':'var(--red)'}">$${qPayout(qs.loaded.filter(Boolean).length)}</strong>`:''}
        </div>
      </div>
    </div>`:''}

    <div class="sec">Score Trend</div>
    <div class="card">
      <div class="card-navy-hdr"><div class="card-navy-title">${name} — Monthly Goals</div></div>
      <div class="card-body"><div class="chart-wrap"><canvas id="chartTechTrend"></canvas></div></div>
    </div>
  `;

  // Render trend chart for this tech
  requestAnimationFrame(()=>{
    const canvas=document.getElementById('chartTechTrend');if(!canvas)return;
    const labels=months.map(mk=>mk.split(' ')[0]);
    const scores=months.map(mk=>data.months[mk]?.techs[name]?.passCount??null);
    charts.techTrend=new Chart(canvas,{
      type:'line',
      data:{labels,datasets:[{
        label:'Goals Hit',data:scores,
        borderColor:'var(--amber)',backgroundColor:'rgba(239,65,54,.1)',
        fill:true,tension:.3,pointRadius:5,pointBackgroundColor:scores.map(v=>v===3?'#15803d':v>=2?'#fbb040':'#b91c1c'),
        pointBorderColor:'#fff',pointBorderWidth:2
      }]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}/3 goals`}}},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:'Figtree',size:11},color:'#64748b'}},
          y:{min:0,max:3,ticks:{stepSize:1,font:{family:'Figtree',size:11},color:'#64748b'},grid:{color:'#f0f4f8'}}
        }
      }
    });
  });
}
function renderLeaderboard(data){
  const months=sortedMonths(data.months);
  const names=allNames(data.months);
  if(!names.length){showErr('No eligible technicians found.');return;}

  // Build leaderboard
  const lb=names.map(n=>{
    const score=yearScore(n,data.months);
    const qs=qStatus(n,data.months);
    const cls=data.roster?.[n]||'';
    const monthScores=months.map(mk=>data.months[mk]?.techs[n]?.passCount??null);
    return{name:n,score,qs,cls,monthScores,months};
  }).sort((a,b)=>b.score-a.score);

  // Year progress for hero
  const topScore=lb[0]?.score||0;
  const totalMonths=months.length;
  const maxPossible=totalMonths*3;

  const wrap=document.getElementById('wrap');
  wrap.innerHTML=`
    <!-- HERO BANNER -->
    <div class="hero-banner">
      <div class="hb-top">
        <div>
          <div class="hb-title">2026 Year-to-Date<br>Leaderboard</div>
          <div class="hb-sub">${totalMonths} month${totalMonths!==1?'s':''} tracked · ${names.length} eligible techs</div>
        </div>
        <div class="hb-stat">
          <div class="hb-stat-num">${topScore}</div>
          <div class="hb-stat-lbl">Top Score</div>
        </div>
      </div>
      <div class="hb-progress">
        <div class="hb-progress-label">Max ${MAX} pts/yr</div>
        <div class="hb-prog-track"><div class="hb-prog-fill" style="width:${Math.round((topScore/MAX)*100)}%"></div></div>
        <div class="hb-progress-label">${totalMonths}/12 mo</div>
      </div>
    </div>

    <!-- RANKED LIST -->
    <div class="sec">2026 Standings — Tap to View Your Page</div>
    <div class="card">
      <div class="card-navy-hdr"><div class="card-navy-title">2026 Standings · #1 $300 · #2 $200 · #3 $100</div></div>
      <div class="lb-list" id="lbList"></div>
    </div>
    <!-- YEAR SCORE BAR CHART -->
    <div class="sec">Year Score — All Techs</div>
    <div class="card">
      <div class="card-navy-hdr"><div class="card-navy-title">Total Goals Hit (Max ${MAX})</div></div>
      <div class="card-body"><div class="chart-wrap"><canvas id="chartYearScore"></canvas></div></div>
    </div>

    <!-- STACKED GOALS BREAKDOWN -->
    <div class="sec">Goals Breakdown by KPI</div>
    <div class="card">
      <div class="card-navy-hdr"><div class="card-navy-title">Dev · Recs · Driver — Stacked</div></div>
      <div class="card-body"><div class="chart-wrap tall"><canvas id="chartStacked"></canvas></div></div>
    </div>

    <!-- TREND LINES -->
    <div class="sec">Month-by-Month Trend</div>
    <div class="card">
      <div class="card-navy-hdr">
        <div class="card-navy-title">Goals Per Month — All Techs</div>
      </div>
      <div class="card-body"><div class="chart-wrap tall"><canvas id="chartTrend"></canvas></div></div>
    </div>

    <!-- QUARTER STATUS -->
    <div class="sec">Q1 2026 — Bonus Status</div>
    <div class="card">
      <div class="card-navy-hdr"><div class="card-navy-title">Quarterly Bonus Tracker</div></div>
      <div class="card-body"><div class="q-grid" id="qGrid"></div></div>
    </div>

  `;

  // Render all sections
  requestAnimationFrame(()=>{
    renderYearScoreChart(lb, months.length);
    renderStackedChart(lb, data.months, months);
    renderTrendChart(lb, data.months, months);
    renderQGrid(lb);
    renderLbList(lb, data.months.length);
  });
}

// ── YEAR SCORE BAR ────────────────────────────────────────────
function renderYearScoreChart(lb, numMonths){
  const canvas=document.getElementById('chartYearScore');if(!canvas)return;
  const maxPossible=numMonths*3;
  const goalPlugin={id:'gl',afterDraw(chart){
    const{ctx,chartArea,scales}=chart;
    const y=scales.y.getPixelForValue(maxPossible);
    if(y<chartArea.top||y>chartArea.bottom)return;
    ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(239,65,54,.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(chartArea.left,y);ctx.lineTo(chartArea.right,y);ctx.stroke();
    ctx.font='10px Figtree';ctx.fillStyle='rgba(239,65,54,.7)';
    ctx.fillText('Max this period',chartArea.right-92,y-4);
    ctx.restore();
  }};
  charts.yearScore=new Chart(canvas,{
    type:'bar',
    data:{
      labels:lb.map(t=>t.name.split(' ')[0]),
      datasets:[{
        data:lb.map(t=>t.score),
        backgroundColor:lb.map((t,i)=>i===0?'rgba(212,119,6,.85)':i===1?'rgba(100,116,139,.75)':i===2?'rgba(120,53,15,.7)':'rgba(28,45,65,.6)'),
        borderRadius:6,borderSkipped:false,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y} pts`}}},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Figtree',size:11},color:'#64748b'}},
        y:{grid:{color:'#f0f4f8'},ticks:{font:{family:'Figtree',size:11},color:'#64748b'},beginAtZero:true,max:Math.ceil(maxPossible*1.15)}
      }
    },
    plugins:[goalPlugin]
  });
}

// ── STACKED BREAKDOWN ─────────────────────────────────────────
function renderStackedChart(lb, months, sortedMons){
  const canvas=document.getElementById('chartStacked');if(!canvas)return;
  // Per tech: count devPass, recPass, drvPass across all months
  const devCounts=[], recCounts=[], drvCounts=[];
  lb.forEach(t=>{
    let dv=0,rc=0,dr=0;
    for(const mk of sortedMons){
      const tk=months[mk]?.techs[t.name];
      if(!tk)continue;
      if(tk.devPass)dv++;
      if(tk.recPass)rc++;
      if(tk.drvPass)dr++;
    }
    devCounts.push(dv);recCounts.push(rc);drvCounts.push(dr);
  });
  charts.stacked=new Chart(document.getElementById('chartStacked'),{
    type:'bar',
    data:{
      labels:lb.map(t=>t.name.split(' ')[0]),
      datasets:[
        {label:'Hr Deviation',data:devCounts,backgroundColor:'rgba(29,78,216,.75)',borderRadius:0,stack:'s'},
        {label:'Recommendations',data:recCounts,backgroundColor:'rgba(21,128,61,.75)',borderRadius:0,stack:'s'},
        {label:'Driver Safety',data:drvCounts,backgroundColor:'rgba(239,65,54,.75)',borderRadius:0,stack:'s'},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'bottom',labels:{font:{family:'Figtree',size:11},color:'#64748b',boxWidth:10,padding:12}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y}`}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Figtree',size:11},color:'#64748b'},stacked:true},
        y:{grid:{color:'#f0f4f8'},ticks:{font:{family:'Figtree',size:11},color:'#64748b'},stacked:true,beginAtZero:true}
      }
    }
  });
}

// ── TREND LINES ───────────────────────────────────────────────
function renderTrendChart(lb, months, sortedMons){
  const canvas=document.getElementById('chartTrend');if(!canvas)return;
  const labels=sortedMons.map(m=>m.split(' ')[0]);
  const datasets=lb.map((t,i)=>{
    const color=TECH_COLORS[i%TECH_COLORS.length];
    return{
      label:t.name.split(' ')[0],
      data:sortedMons.map(mk=>months[mk]?.techs[t.name]?.passCount??null),
      borderColor:color,
      backgroundColor:'transparent',
      borderWidth:2,
      pointBackgroundColor:sortedMons.map(mk=>{
        const tk=months[mk]?.techs[t.name];
        if(!tk)return'transparent';
        return tk.monthPass?color:'rgba(185,28,28,.8)';
      }),
      pointBorderColor:'#fff',
      pointBorderWidth:1.5,
      pointRadius:5,
      tension:0.3,
      spanGaps:true,
    };
  });
  charts.trend=new Chart(canvas,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{position:'bottom',labels:{font:{family:'Figtree',size:11},color:'#64748b',boxWidth:10,padding:10,usePointStyle:true}},
        tooltip:{callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y??'—'}/3`}}
      },
      scales:{
        x:{grid:{display:false},ticks:{font:{family:'Figtree',size:11},color:'#64748b'}},
        y:{grid:{color:'#f0f4f8'},ticks:{font:{family:'Figtree',size:11},color:'#64748b',stepSize:1},min:0,max:3}
      }
    },
    plugins:[{id:'passLine',afterDraw(chart){
      const{ctx,chartArea,scales}=chart;
      const y=scales.y.getPixelForValue(2);
      ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle='rgba(100,116,139,.35)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(chartArea.left,y);ctx.lineTo(chartArea.right,y);ctx.stroke();
      ctx.font='9px Figtree';ctx.fillStyle='rgba(100,116,139,.5)';ctx.fillText('Pass line',chartArea.right-50,y-3);
      ctx.restore();
    }}]
  });
}

// ── QUARTER GRID ──────────────────────────────────────────────
function renderQGrid(lb){
  const grid=document.getElementById('qGrid');if(!grid)return;
  grid.innerHTML=lb.map(t=>{
    const q=t.qs;if(!q)return'';
    const passedMos=q.loaded.filter(Boolean).length;
    const ql=qLabel(passedMos,q.loaded.length);
    const cardCls=ql.cls,vCls=ql.short,vTxt=ql.chipTxt;
    const dots=q.qMons.map((mk,i)=>{
      const v=q.results[i],mo=mk.split(' ')[0];
      const cls=v===true?'pass':v===false?'fail':'none';
      return`<div class="qs-dot ${cls}"><span>${v===true?'✓':v===false?'✗':'·'}</span><span class="qs-dot-mo">${mo}</span></div>`;
    }).join('');
    return`<div class="qstat-card ${cardCls}">
      <div class="qs-name">${t.name.split(' ')[0]}</div>
      <div class="qs-dots">${dots}</div>
      <div class="qs-verdict ${vCls}">${vTxt}</div>
    </div>`;
  }).join('');
}

// ── RANKED LIST ───────────────────────────────────────────────
function renderLbList(lb){
  const list=document.getElementById('lbList');if(!list)return;
  list.innerHTML=lb.map((t,i)=>{
    const rank=i+1,isTop3=rank<=3;
    const rankWrap=isTop3?`<div class="lb-rank-icon">${RANK_ICONS[i]}</div>`:`<div class="lb-rank-num">${rank}</div>`;
    const barPct=Math.round((t.score/MAX)*100);
    const fillClr=isTop3?RANK_BAR[i]:'#cbd5e1';
    const q=t.qs;
    let qDotClr='#cbd5e1';
    if(q){if(q.anyFail)qDotClr='#fca5a5';else if(q.allPass)qDotClr='#a7f3d0';else if(q.loaded.length>0)qDotClr='#93c5fd';}
    return`<a class="lb-item" href="tech.html?tech=${toSlug(t.name)}">
      <div class="lb-rank-wrap">${rankWrap}</div>
      <div class="lb-avatar">${initials(t.name)}</div>
      <div class="lb-info">
        <div class="lb-name">${t.name}</div>
        <div class="lb-class">${t.cls||'—'}</div>
      </div>
      <div class="lb-right">
        <div class="lb-score ${isTop3?'s'+rank:''}">${t.score}</div>
        <div class="lb-score-max">/ ${MAX}</div>
        <div class="lb-mini-bar"><div class="lb-mini-fill" style="width:${barPct}%;background:${fillClr}"></div></div>
        ${(()=>{
          const i2=lb.indexOf(t);
          const rank2=i2+1;
          const q=t.qs;
          const pm=q?.loaded?.filter(Boolean).length||0;
          // Year bonus chip (top 3)
          let yChip='';
          if(rank2===1)yChip='<div class="lb-bonus-chip">★ $300</div>';
          else if(rank2===2)yChip='<div class="lb-bonus-chip" style="background:var(--blt);color:var(--blue);border-color:var(--bbd)">$200</div>';
          else if(rank2===3)yChip='<div class="lb-bonus-chip" style="background:var(--glt);color:var(--green);border-color:var(--gbd)">$100</div>';
          // Q bonus chip
          let qChip='';
          if(q){
            const pay=qPayout(pm);
            if(!q.quarterDone&&pm>0)qChip=`<div class="lb-bonus-chip" style="background:var(--blt);color:var(--blue);border-color:var(--bbd);margin-top:2px">Q:${pm}/3</div>`;
            else if(q.quarterDone&&pay>0)qChip=`<div class="lb-bonus-chip" style="${pay===200?'background:var(--alt);color:var(--golddk);border-color:var(--abd)':'background:var(--glt);color:var(--green);border-color:var(--gbd)'};margin-top:2px">Q $${pay}</div>`;
          }
          return yChip+qChip;
        })()}
      </div>
      <div class="lb-arrow">›</div>
    </a>`;
  }).join('');
}

init();
</script>
