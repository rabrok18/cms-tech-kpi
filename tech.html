<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS — Tech Performance</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');
:root{
  --navy:#1c2d41;--navy2:#243347;--navy3:#2d3f56;
  --bg:#f2f4f7;--white:#fff;--border:#e2e8f0;--text:#0f1623;--sub:#64748b;
  --green:#15803d;--glt:#f0fdf4;--gbd:#a7f3d0;
  --red:#b91c1c;--rlt:#fef2f2;--rbd:#fca5a5;
  --amber:#ef4136;--alt:#fff7ed;--abd:#fdba74;
  --gold:#fbb040;--golddk:#92400e;
  --blue:#1d4ed8;--blt:#eff6ff;--bbd:#93c5fd;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:'Figtree',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HDR */
.hdr{background:var(--navy);height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;position:sticky;top:0;z-index:100;border-bottom:1px solid var(--navy3)}
.hdr-back{font-size:12px;color:rgba(255,255,255,.5);text-decoration:none;display:flex;align-items:center;gap:5px;transition:color .15s}
.hdr-back:hover{color:#fff}
.hdr-right{font-size:11px;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:5px}
.live-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:blink 2.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* WRAP */
.wrap{max-width:480px;margin:0 auto;padding:16px 14px 64px;display:flex;flex-direction:column;gap:12px}

/* HERO */
.hero{background:var(--navy);border-radius:var(--r);padding:20px 18px 18px}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.hero-name{font-size:22px;font-weight:900;color:#fff;line-height:1.05}
.hero-role{font-size:12px;color:rgba(255,255,255,.5);margin-top:3px}
.hero-rank{background:rgba(251,176,64,.15);border:1px solid rgba(251,176,64,.3);border-radius:10px;padding:8px 12px;text-align:center;flex-shrink:0}
.rank-num{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--gold);line-height:1}
.rank-lbl{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(251,176,64,.6);margin-top:2px}
.yr-prog{margin-bottom:14px}
.yp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.yp-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.5)}
.yp-score{font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:var(--gold)}
.yp-max{font-size:11px;color:rgba(255,255,255,.35)}
.yp-track{height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}
.yp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--amber),var(--gold));transition:width .8s cubic-bezier(.4,0,.2,1)}
.q-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.q-badge{font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:5px}
.qb-bonus{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3)}
.qb-partial{background:rgba(251,176,64,.18);color:var(--gold);border:1px solid rgba(251,176,64,.35)}
.qb-dead{background:rgba(248,113,113,.15);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.qb-alive{background:rgba(96,165,250,.15);color:#60a5fa;border:1px solid rgba(96,165,250,.3)}
.qb-pend{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12)}
.q-dots{display:flex;gap:4px}
.qdot{height:26px;width:38px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;gap:1px}
.qdot-mo{font-size:8px;opacity:.6}
.qdot.pass{background:rgba(74,222,128,.18);color:#4ade80}
.qdot.fail{background:rgba(248,113,113,.18);color:#f87171}
.qdot.none{background:rgba(255,255,255,.07);color:rgba(255,255,255,.35)}

/* SEC */
.sec{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--sub);margin-bottom:-4px}

/* QUARTER CARD */
.q-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-navy-hdr{background:var(--navy);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.card-navy-title{font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:rgba(255,255,255,.6)}
.q-months{display:grid;grid-template-columns:repeat(3,1fr)}
.qm{padding:14px 10px;text-align:center;border-right:1px solid var(--border)}
.qm:last-child{border-right:none}
.qm.qm-pass{background:var(--glt)}
.qm.qm-fail{background:var(--rlt)}
.qm.qm-future{background:#f8fafc;opacity:.6}
.qm-name{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--sub);margin-bottom:8px}
.qm.qm-pass .qm-name{color:#166534}
.qm.qm-fail .qm-name{color:#991b1b}
.qm-icon{font-size:18px;margin-bottom:4px}
.qm-frac{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1;margin-bottom:3px}
.qm-frac.fg{color:var(--green)}.qm-frac.fr{color:var(--red)}.qm-frac.fx{color:#94a3b8}
.qm-sub{font-size:10px;color:var(--sub)}
.q-verdict{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)}
.qv-text{font-size:13px;font-weight:700}
.qv-text.vg{color:var(--green)}.qv-text.vr{color:var(--red)}.qv-text.vb{color:var(--blue)}.qv-text.vp{color:var(--golddk)}.qv-text.vy{color:var(--sub)}

/* PAYOUT CHIP */
.payout-chip{font-size:13px;font-weight:800;padding:6px 14px;border-radius:8px}
.pc-full{background:var(--glt);color:var(--green);border:1px solid var(--gbd)}
.pc-partial{background:var(--alt);color:var(--golddk);border:1px solid var(--abd)}
.pc-zero{background:var(--bg);color:var(--sub);border:1px solid var(--border)}
.pc-progress{background:var(--blt);color:var(--blue);border:1px solid var(--bbd)}

/* PAYOUT TIERS STRIP */
.payout-strip{display:flex;gap:0;border-top:1px solid var(--border)}
.pt-tier{flex:1;padding:10px 6px;text-align:center;border-right:1px solid var(--border)}
.pt-tier:last-child{border-right:none}
.pt-tier.active{background:var(--alt)}
.pt-mo{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);margin-bottom:3px}
.pt-amt{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--text)}
.pt-tier.active .pt-mo{color:var(--golddk)}
.pt-tier.active .pt-amt{color:var(--golddk);font-weight:700}
.pt-tier.earned{background:var(--glt)}
.pt-tier.earned .pt-mo{color:var(--green)}
.pt-tier.earned .pt-amt{color:var(--green);font-weight:700}

/* GAUGE */
.gauge-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-body{padding:16px 14px 14px}
.gauge-sub{font-size:11px;color:var(--sub);margin-bottom:14px}
.gauges-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.gauge-item{display:flex;flex-direction:column;align-items:center}
.gauge-wrap{position:relative;width:100%;max-width:130px}
.gauge-canvas{width:100%!important}
.gauge-center{position:absolute;top:52%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.gauge-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;line-height:1}
.gauge-unit{font-size:9px;color:var(--sub);margin-top:1px}
.gauge-name{font-size:11px;font-weight:700;margin-top:4px;text-align:center}
.gauge-goal{font-size:10px;color:var(--sub);text-align:center}
.gauge-status{font-size:10px;font-weight:700;margin-top:3px;text-align:center}
.gs-pass{color:var(--green)}.gs-fail{color:var(--red)}.gs-na{color:var(--sub)}

/* TREND */
.trend-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.trend-tabs{display:flex;gap:4px}
.ttab{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.5);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .15s}
.ttab.active{background:rgba(251,176,64,.25);color:var(--gold);border-color:rgba(251,176,64,.4)}
.chart-area{height:160px;position:relative}
.chart-legend{display:flex;gap:12px;margin-top:10px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--sub)}
.cl-dot{width:8px;height:8px;border-radius:2px}

/* HISTORY */
.hist-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.mrow{border-bottom:1px solid var(--border)}
.mrow:last-child{border-bottom:none}
.mr-hdr{padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mr-hdr:active{background:var(--bg)}
.mrl{display:flex;align-items:center;gap:10px}
.mr-mo{font-size:14px;font-weight:700}
.mr-chip{font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px}
.mrc-p{background:var(--glt);color:var(--green);border:1px solid var(--gbd)}
.mrc-t{background:var(--alt);color:var(--golddk);border:1px solid var(--abd)}
.mrc-f{background:var(--rlt);color:var(--red);border:1px solid var(--rbd)}
.mr-chev{font-size:13px;color:#94a3b8;transition:transform .2s}
.mr-chev.open{transform:rotate(180deg)}
.mr-body{display:none;padding:0 16px 14px}
.mr-body.open{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.kc{border-radius:9px;padding:10px 9px 8px;border:1px solid var(--border);background:var(--bg)}
.kc.kp{background:var(--glt);border-color:var(--gbd)}
.kc.kf{background:var(--rlt);border-color:var(--rbd)}
.kc-lbl{font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--sub);margin-bottom:4px}
.kc.kp .kc-lbl{color:#166534;opacity:.8}.kc.kf .kc-lbl{color:#991b1b;opacity:.8}
.kc-val{font-family:'DM Mono',monospace;font-size:15px;color:var(--text);margin-bottom:1px}
.kc-goal{font-size:9px;color:var(--sub);margin-bottom:4px}
.kc-res{font-size:10px;font-weight:700}
.kc-res.rp{color:var(--green)}.kc-res.rf{color:var(--red)}.kc-res.rx{color:var(--sub)}

/* LEADERBOARD */
.lb-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lb-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:rgba(251,176,64,.18);color:var(--gold);border:1px solid rgba(251,176,64,.3)}
.lb-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)}
.lb-row:last-child{border-bottom:none}
.lb-row.you{background:#fffbeb}
.lb-row.t1{background:#fefdf8}
.lb-rank-wrap{width:28px;text-align:center;flex-shrink:0}
.lb-rank{font-size:18px;line-height:1}
.lb-rank-num{font-family:'DM Mono',monospace;font-size:13px;color:var(--sub)}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-name.yn{color:#c2410c}
.lb-you-tag{font-size:9px;font-weight:700;color:#c2410c;letter-spacing:.5px;margin-left:4px}
.lb-sub{font-size:11px;color:var(--sub);margin-top:1px}
.lb-right{text-align:right;flex-shrink:0}
.lb-pts{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;line-height:1}
.lb-pts.c1{color:#b45309}.lb-pts.c2{color:#64748b}.lb-pts.c3{color:#78350f}
.lb-pts-max{font-size:10px;color:var(--sub)}
.lb-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;width:64px;margin:4px 0 0 auto}
.lb-bar-fill{height:100%;border-radius:2px}
.lb-bonus-chip{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;background:var(--alt);color:var(--golddk);border:1px solid var(--abd);display:inline-block;margin-top:3px}

.no-data{text-align:center;padding:80px 20px;color:var(--sub)}
.no-data .icon{font-size:36px;margin-bottom:12px}
.switch-link{display:block;text-align:center;margin-top:4px;font-size:12px;color:var(--sub);text-decoration:none}
.switch-link:hover{color:#c2410c}
</style>
</head>

<script>
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const QS={Q1:['Jan','Feb','Mar'],Q2:['Apr','May','Jun'],Q3:['Jul','Aug','Sep'],Q4:['Oct','Nov','Dec']};
const MAX=36;
const ELIGIBLE=['3rd Year Apprentice','4th Year Apprentice','5th Year Apprentice','Journeyman'];
const RANK_ICONS=['🥇','🥈','🥉'];
const RANK_BAR=['#d97706','#94a3b8','#92400e'];

// Payout tiers
// Quarterly payout: based on total goals hit (0-9)
function qPayout(totalGoals){if(totalGoals>=9)return 300;if(totalGoals>=6)return 200;return 0;}


const toSlug=n=>n.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
const fromSlug=(s,ns)=>ns.find(n=>toSlug(n)===s)||null;
const sortedMonths=m=>Object.keys(m).sort((a,b)=>{const[am,ay]=a.split(' '),[bm,by]=b.split(' ');return(parseInt(ay)-parseInt(by))||(MON.indexOf(am)-MON.indexOf(bm))});
function allNames(months){const s=new Set();for(const md of Object.values(months))Object.keys(md.techs).forEach(n=>s.add(n));return[...s].sort()}
function yearScore(name,months){let t=0;for(const md of Object.values(months)){const tk=md.techs[name];if(tk)t+=tk.passCount;}return t}

function filterEligible(data){
  const out=JSON.parse(JSON.stringify(data));
  for(const mk of Object.keys(out.months)){
    const techs=out.months[mk].techs;
    for(const n of Object.keys(techs)){
      if(data.active&&data.active[n]===false){delete techs[n];}
    }
  }
  return out;
}

function qStatus(name,months){
  const s=sortedMonths(months);if(!s.length)return null;
  const[lm,ly]=s[s.length-1].split(' ');
  const curQ=Object.entries(QS).find(([,ms])=>ms.includes(lm))[0];
  const qMons=QS[curQ].map(m=>`${m} ${ly}`);
  const results=qMons.map(mk=>months[mk]?.techs[name]?.monthPass??null);
  const loaded=results.filter(v=>v!==null);
  const passedMos=loaded.filter(Boolean).length;
  const payout=qPayout(passedMos);
  const quarterDone=loaded.length===3;
  const totalGoals=qMons.reduce((sum,mk)=>sum+(months[mk]?.techs[name]?.passCount||0),0);
  const maxGoals=loaded.length*3;
  const payout2=quarterDone?qPayout(totalGoals):null;
  return{curQ,ly,qMons,results,loaded,passedMos,totalGoals,maxGoals,payout:payout2,quarterDone,
    anyFail:results.some(v=>v===false),
    allPass:loaded.length===3&&loaded.every(Boolean)};
}

function leaderboard(months){
  return allNames(months).map(n=>({name:n,score:yearScore(n,months),months:Object.keys(months).length})).sort((a,b)=>b.score-a.score);
}

async function init(){
  let data;
  try{const r=await fetch('data.json?v='+Date.now());if(!r.ok)throw 0;data=await r.json();}
  catch{showErr('Could not load KPI data. Check back soon.');return;}
  if(!data||!Object.keys(data.months||{}).length){showErr('No data published yet.');return;}
  if(data.updatedAt)document.getElementById('hdrDate').textContent=new Date(data.updatedAt).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  data=filterEligible(data);
  const slug=new URLSearchParams(location.search).get('tech');
  const names=allNames(data.months);
  if(!slug||!fromSlug(slug,names)){
    // redirect to leaderboard if no valid tech
    location.href='index.html';return;
  }
  const name=fromSlug(slug,names);
  renderPage(name,data);
}

function showErr(msg){document.getElementById('wrap').innerHTML=`<div class="no-data"><div class="icon">📊</div><p>${msg}</p></div>`}

let trendChart=null,trendStore={},trendMons=[];

function renderPage(name,data){
  const months=data.months;
  const sorted=sortedMonths(months);
  const score=yearScore(name,months);
  const pct=Math.round((score/MAX)*100);
  const qs=qStatus(name,months);
  const lb=leaderboard(months);
  const myRank=lb.findIndex(r=>r.name===name)+1;
  const cls=data.roster?.[name]||'';

  // Hero quarter badge
  let qBCls,qBTxt;
  const tg=qs.totalGoals||0,mg=qs.maxGoals||0,qd=qs.quarterDone;
  if(qd){
    if(tg>=9){qBCls='qb-bonus';qBTxt=`★ $300 — Perfect Quarter (${tg}/9)`;}
    else if(tg>=6){qBCls='qb-partial';qBTxt=`◑ $200 — Partial Bonus (${tg}/9)`;}
    else{qBCls='qb-dead';qBTxt=`✗ $0 — No Bonus (${tg}/9)`;}
  } else {
    if(mg>0){qBCls='qb-alive';qBTxt=`◉ ${qs.curQ} — ${tg}/${mg} goals so far`;}
    else{qBCls='qb-pend';qBTxt=`· ${qs.curQ} — Pending`;}
  }

  const qDots=qs.qMons.map((mk,i)=>{
    const v=qs.results[i],mo=mk.split(' ')[0];
    const cls2=v===true?'pass':v===false?'fail':'none';
    return`<div class="qdot ${cls2}"><span>${v===true?'✓':v===false?'✗':'·'}</span><span class="qdot-mo">${mo}</span></div>`;
  }).join('');

  // Quarter month columns
  const qCols=qs.qMons.map((mk)=>{
    const t=months[mk]?.techs[name],mo=mk.split(' ')[0];
    if(!t)return`<div class="qm qm-future"><div class="qm-name">${mo}</div><div class="qm-icon">·</div><div class="qm-frac fx">—</div><div class="qm-sub">Pending</div></div>`;
    const mcls=t.monthPass?'qm-pass':'qm-fail';
    const fcls=t.monthPass?'fg':'fr';
    return`<div class="qm ${mcls}"><div class="qm-name">${mo}</div><div class="qm-icon">${t.monthPass?'✓':'✗'}</div><div class="qm-frac ${fcls}">${t.passCount}/3</div><div class="qm-sub">${t.monthPass?'Pass':'Fail'}</div></div>`;
  }).join('');

  // Quarter verdict + payout chip
  let qvCls,qvTxt,pcCls,pcTxt;
  if(qd){
    if(tg>=9){qvCls='vg';qvTxt='9/9 goals hit — perfect quarter!';pcCls='pc-full';pcTxt='$300';}
    else if(tg>=6){qvCls='vp';qvTxt=`${tg}/9 goals hit — partial bonus`;pcCls='pc-partial';pcTxt='$200';}
    else{qvCls='vr';qvTxt=`${tg}/9 goals hit — no bonus`;pcCls='pc-zero';pcTxt='$0';}
  } else {
    qvCls='vb';qvTxt=`${tg}/${mg} goals hit so far — quarter in progress`;pcCls='pc-progress';pcTxt=`${tg}/${mg}`;
  }

  // Payout tier strip — highlight active/earned tier
  function tierCls(tier){
    if(qd){return pm>=tier?'earned':'';}
    return pm>=tier?'active':'';
  }

  // Trend data
  const withData=sorted.filter(mk=>months[mk]?.techs[name]);
  trendMons=withData.map(mk=>mk.split(' ')[0]);
  trendStore={
    dev:withData.map(mk=>months[mk].techs[name].avgDev!==null?+parseFloat(months[mk].techs[name].avgDev).toFixed(2):null),
    rec:withData.map(mk=>months[mk].techs[name].rec),
    drv:withData.map(mk=>months[mk].techs[name].drv),
    devPass:withData.map(mk=>months[mk].techs[name].devPass),
    recPass:withData.map(mk=>months[mk].techs[name].recPass),
    drvPass:withData.map(mk=>months[mk].techs[name].drvPass),
  };

  const lastMk=[...sorted].reverse().find(mk=>months[mk]?.techs[name]);
  const lastT=lastMk?months[lastMk].techs[name]:null;

  const latestChip=lastT?(lastT.passCount===3
    ?`<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:5px;background:rgba(74,222,128,.18);color:#4ade80;border:1px solid rgba(74,222,128,.3)">3/3 ✓ Pass</span>`
    :lastT.monthPass
      ?`<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:5px;background:rgba(251,176,64,.18);color:#fbb040;border:1px solid rgba(251,176,64,.3)">${lastT.passCount}/3 Pass</span>`
      :`<span style="font-size:11px;font-weight:700;padding:2px 9px;border-radius:5px;background:rgba(248,113,113,.18);color:#f87171;border:1px solid rgba(248,113,113,.3)">${lastT.passCount}/3 Fail</span>`):'';

  // Month history rows
  const monthRows=sorted.slice().reverse().map((mk,mi)=>{
    const t=months[mk]?.techs[name];if(!t)return'';
    const first=mi===0;
    const cc=t.passCount===3?'mrc-p':t.monthPass?'mrc-t':'mrc-f';
    const devD=t.avgDev!==null?parseFloat(t.avgDev).toFixed(2)+'h':'—';
    return`<div class="mrow"><div class="mr-hdr" onclick="togRow(this)"><div class="mrl"><div class="mr-mo">${mk}</div><div class="mr-chip ${cc}">${t.passCount}/3 — ${t.monthPass?'Pass':'Fail'}</div></div><div class="mr-chev ${first?'open':''}">▾</div></div><div class="mr-body ${first?'open':''}"><div class="kpi-grid">${kc('Hr Dev',devD,t.devPass,'≤ 0 hrs')}${kc('Recs',t.rec!==null?t.rec:'—',t.recPass,'20+')}${kc('Driver',t.drv!==null?t.drv:'—',t.drvPass,'75+')}</div></div></div>`;
  }).join('');

  // Leaderboard rows
  const lbRows=lb.map((entry,i)=>{
    const rank=i+1,isYou=entry.name===name,isTop3=rank<=3;
    const rankWrap=isTop3?`<div class="lb-rank">${RANK_ICONS[i]}</div>`:`<div class="lb-rank-num">${rank}</div>`;
    const barPct=Math.round((entry.score/MAX)*100);
    const fillClr=isTop3?RANK_BAR[i]:'#cbd5e1';
    const entryQs=qStatus(entry.name,months);
    const entryTg=entryQs?.totalGoals||0;
    const entryPay=entryQs?.payout||0;
    const payChip=entryPay>0&&entryQs?.quarterDone
      ?`<div class="lb-bonus-chip" ${entryPay===200?'style="background:var(--alt);color:var(--golddk);border-color:var(--abd)"':''}>${entryPay===300?'★ ':''}$${entryPay}</div>`
      :entryQs&&!entryQs.quarterDone&&entryTg>0
        ?`<div class="lb-bonus-chip" style="background:var(--blt);color:var(--blue);border-color:var(--bbd)">${entryTg}/${entryQs.maxGoals||'?'} goals</div>`:'';
    return`<div class="lb-row ${isYou?'you':rank===1?'t1':''}"><div class="lb-rank-wrap">${rankWrap}</div><div class="lb-info"><div class="lb-name ${isYou?'yn':''}">${entry.name}${isYou?'<span class="lb-you-tag">YOU</span>':''}</div><div class="lb-sub">${entry.months} month${entry.months!==1?'s':''} · ${cls&&isYou?cls:'—'}</div></div><div class="lb-right"><div class="lb-pts ${isTop3?'c'+rank:''}">${entry.score}</div><div class="lb-pts-max">/ ${MAX}</div><div class="lb-bar"><div class="lb-bar-fill" style="width:${barPct}%;background:${fillClr}"></div></div>${payChip}</div></div>`;
  }).join('');

  document.getElementById('wrap').innerHTML=`
    <!-- HERO -->
    <div class="hero">
      <div class="hero-top">
        <div><div class="hero-name">${name}</div><div class="hero-role">${cls||'Field Technician'} · Rank #${myRank} of ${lb.length}</div></div>
        <div class="hero-rank"><div class="rank-num">#${myRank}</div><div class="rank-lbl">Year Rank</div></div>
      </div>
      <div class="yr-prog">
        <div class="yp-row"><span class="yp-lbl">2026 Year Score</span><span><span class="yp-score">${score}</span> <span class="yp-max">/ ${MAX} pts</span></span></div>
        <div class="yp-track"><div class="yp-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="q-row"><div class="q-badge ${qBCls}">${qBTxt}</div><div class="q-dots">${qDots}</div></div>
    </div>

    <!-- QUARTER SECTION -->
    <div class="sec">${qs.curQ} ${qs.ly} — Quarterly Bonus</div>
    <div class="q-card">
      <div class="card-navy-hdr"><div class="card-navy-title">${qs.curQ} ${qs.ly} Tracker</div><div style="font-size:10px;color:rgba(255,255,255,.4)">6+ goals = $200 · 9/9 = $300</div></div>
      <div class="q-months">${qCols}</div>
      <div class="q-verdict">
        <div class="qv-text ${qvCls}">${qvTxt}</div>
        <div class="payout-chip ${pcCls}">${pcTxt}</div>
      </div>
      <!-- Payout tier strip -->
      <div class="payout-strip">
        <div class="pt-tier ${tg<6&&qd?'earned':''}"><div class="pt-mo">0–5 goals</div><div class="pt-amt">$0</div></div>
        <div class="pt-tier ${tg>=6?'earned':''}"><div class="pt-mo">6–8 goals</div><div class="pt-amt">$200</div></div>
        <div class="pt-tier ${tg>=9?'earned':''}"><div class="pt-mo">9/9 goals</div><div class="pt-amt">$300</div></div>
      </div>
    </div>

    <!-- GAUGES -->
    <div class="sec">${lastMk||'Latest Month'} — KPI Gauges</div>
    <div class="gauge-card">
      <div class="card-navy-hdr"><div class="card-navy-title">Goal Meters — ${lastMk||''}</div>${latestChip}</div>
      <div class="card-body"><div class="gauge-sub">${lastT?lastT.jobs+' jobs completed this month':''}</div><div class="gauges-row" id="gaugesRow"></div></div>
    </div>

    <!-- TREND -->
    <div class="trend-card">
      <div class="card-navy-hdr"><div class="card-navy-title">Performance Trend</div><div class="trend-tabs"><div class="ttab active" onclick="switchTrend(this,'dev')">Dev</div><div class="ttab" onclick="switchTrend(this,'rec')">Recs</div><div class="ttab" onclick="switchTrend(this,'drv')">Driver</div></div></div>
      <div class="card-body"><div class="chart-area"><canvas id="trendChart"></canvas></div><div class="chart-legend"><div class="cl-item"><div class="cl-dot" style="background:#f97316"></div>Actual</div><div class="cl-item"><div class="cl-dot" style="background:#e2e8f0;border:1px dashed #94a3b8"></div>Goal</div></div></div>
    </div>

    <!-- HISTORY -->
    <div class="sec">Monthly Breakdown</div>
    <div class="hist-card"><div class="card-navy-hdr"><div class="card-navy-title">All Months</div></div>${monthRows}</div>

    <!-- LEADERBOARD -->
    <div class="sec">🏆 Year Leaderboard — Top 3 Win Bonus</div>
    <div class="lb-card"><div class="card-navy-hdr"><div class="card-navy-title">2026 Standings</div><div class="lb-tag">Max ${MAX} pts · #1=$300 #2=$200 #3=$100</div></div>${lbRows}</div>
    <a class="switch-link" href="index.html">← Back to leaderboard</a>`;

  if(lastT)renderGauges(lastT);
  buildTrend('dev');
}

function renderGauges(t){
  const G=[
    {id:'g1',pct:t.avgDev!==null?Math.min(Math.max((0-t.avgDev)/4,0),1):0,val:t.avgDev!==null?parseFloat(t.avgDev).toFixed(2):'—',unit:'hrs avg',name:'Hr Deviation',goal:'≤ 0 hrs',pass:t.devPass},
    {id:'g2',pct:t.rec!==null?Math.min(t.rec/40,1):0,val:t.rec!==null?t.rec:'—',unit:'recs',name:'Recommendations',goal:'20+',pass:t.recPass},
    {id:'g3',pct:t.drv!==null?Math.min(t.drv/100,1):0,val:t.drv!==null?t.drv:'—',unit:'score',name:'Driver Safety',goal:'75+',pass:t.drvPass},
  ];
  document.getElementById('gaugesRow').innerHTML=G.map(g=>`<div class="gauge-item"><div class="gauge-wrap"><canvas class="gauge-canvas" id="${g.id}"></canvas><div class="gauge-center"><div class="gauge-val" style="color:${g.pass===true?'#15803d':g.pass===false?'#b91c1c':'#64748b'}">${g.val}</div><div class="gauge-unit">${g.unit}</div></div></div><div class="gauge-name">${g.name}</div><div class="gauge-goal">Goal ${g.goal}</div><div class="gauge-status ${g.pass===true?'gs-pass':g.pass===false?'gs-fail':'gs-na'}">${g.pass===true?'✓ Met':g.pass===false?'✗ Missed':'—'}</div></div>`).join('');
  G.forEach(g=>{
    const c=g.pass===true?'#16a34a':g.pass===false?'#dc2626':'#94a3b8';
    new Chart(document.getElementById(g.id),{type:'doughnut',data:{datasets:[{data:[g.pct,1-g.pct],backgroundColor:[c,'#e2e8f0'],borderWidth:0,borderRadius:g.pct<1?[4,0]:0,circumference:240,rotation:240}]},options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:false}},animation:{animateRotate:true,duration:900},events:[]}});
  });
}

const TCFG={dev:{label:'Avg Hr Deviation',goal:0,unit:'h',pk:'devPass'},rec:{label:'Recommendations',goal:20,unit:'',pk:'recPass'},drv:{label:'Driver Safety',goal:75,unit:'',pk:'drvPass'}};
function buildTrend(key){
  if(trendChart){trendChart.destroy();trendChart=null;}
  const cfg=TCFG[key],data=trendStore[key],passes=trendStore[cfg.pk];
  const canvas=document.getElementById('trendChart');if(!canvas)return;
  const gl={id:'gl',afterDraw(chart){
    const{ctx,chartArea,scales}=chart,y=scales.y.getPixelForValue(cfg.goal);
    if(y<chartArea.top||y>chartArea.bottom)return;
    ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle='#94a3b8';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(chartArea.left,y);ctx.lineTo(chartArea.right,y);ctx.stroke();
    ctx.font='10px Figtree';ctx.fillStyle='#94a3b8';ctx.fillText('Goal',chartArea.right-26,y-4);ctx.restore();
  }};
  trendChart=new Chart(canvas,{type:'line',data:{labels:trendMons,datasets:[{label:cfg.label,data,borderColor:'#f97316',backgroundColor:'rgba(249,115,22,.08)',borderWidth:2.5,pointBackgroundColor:passes.map(p=>p===true?'#16a34a':p===false?'#dc2626':'#94a3b8'),pointBorderColor:'#fff',pointBorderWidth:1.5,pointRadius:5,pointHoverRadius:7,fill:true,tension:0.35,spanGaps:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.y}${cfg.unit}`}}},scales:{x:{grid:{color:'#f0f4f8'},ticks:{font:{family:'Figtree',size:11},color:'#64748b'}},y:{grid:{color:'#f0f4f8'},ticks:{font:{family:'Figtree',size:11},color:'#64748b'},beginAtZero:true}}},plugins:[gl]});
}
function switchTrend(el,key){document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('active'));el.classList.add('active');buildTrend(key);}
function togRow(hdr){const body=hdr.nextElementSibling,chev=hdr.querySelector('.mr-chev'),open=body.classList.contains('open');body.classList.toggle('open',!open);chev.classList.toggle('open',!open);}
function kc(lbl,val,pass,goal){const cls=pass===true?'kp':pass===false?'kf':'',rc=pass===true?'rp':pass===false?'rf':'rx',rt=pass===true?'✓ Met':pass===false?'✗ Missed':'—';return`<div class="kc ${cls}"><div class="kc-lbl">${lbl}</div><div class="kc-val">${val}</div><div class="kc-goal">Goal: ${goal}</div><div class="kc-res ${rc}">${rt}</div></div>`;}
init();
</script>
</body>
</html>
